name: ML Model CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Tests
        run: |
          python -c "import sys; print(f'Python {sys.version} is ready!')"
          python -c "import pylint; print('Pylint imported successfully')"
          python -c "import pytest; print('Pytest imported successfully')"

      - name: Upload README as Artifact
        uses: actions/upload-artifact@v3
        with:
          name: project-doc
          path: README.md
